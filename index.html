<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="main.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <div id="startScreen">
        <h1>Driving Checker 🚘</h1>
        <h2>Are you road-ready?</h2>
        <p>
          Find out if you meet the legal age requirement to get behind the
          wheel.
        </p>
        <button onclick="startApp()" class="button_top">
          Check my eligibility →
        </button>
      </div>

      <div class="hidden" id="formScreen">
        <h1>
          Enter your details below and we'll check your driving eligibility.
        </h1>
        <label for="name">Full Name</label>
        <input
          class="input-element"
          placeholder="Enter your name"
          type="text"
          id="name"
        />
        <label for="birthYear">Year of birth</label>
        <input
          class="input-element2"
          placeholder="Enter your birthyear"
          type="number"
          id="birthYear"
        />

        <button onclick="checkAge()" class="button_top">Submit</button>
      </div>

      <div class="hidden" id="resultScreen">
        <h1>Your Result</h1>
        <h1 id="message"></h1>
        <button onclick="restartApp()" class="button_top">Restart</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
